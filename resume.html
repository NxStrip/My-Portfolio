<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume | [NxStrip]</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header">
        <div class="nav-container">
            <div class="logo"><a href="index.html">[NxStrip]</a></div>
            <nav id="navbar">
                <ul class="nav-links">
                    <li><a href="index.html" class="nav-link">Home</a></li>

                </ul>
            </nav>

                <button id="theme-toggle"><i class="fas fa-sun"></i></button>

        </div>

    <main class="section-container" style="text-align: center;">
        <h2 class="section-title">Curriculum Vitae</h2>
        <p class="text-muted" style="margin-bottom: 3rem;">View my professional experience and academic background.</p>

            <div class="hero-buttons">
                <a href="assets/resume.pdf" download class="btn btn-primary">

                <a href="assets/resume.pdf" target="_blank" class="btn btn-secondary">
